<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var path = window.location.pathname === "/404.html" ? "/" : window.location.pathname;
        var target = "/#" + path + window.location.search + window.location.hash;
        window.location.replace(target);
      })();
    </script>
  </head>
  <body></body>
</html>
